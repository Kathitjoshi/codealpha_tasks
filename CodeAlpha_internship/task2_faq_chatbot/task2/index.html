<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tech FAQ Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    h1 { color: #7c3aed; margin-bottom: 4px; font-size: 1.8rem; }
    .subtitle { color: #aaa; font-size: 0.9rem; margin-bottom: 20px; }
    .chat-container { width: 100%; max-width: 700px; background: #16213e; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; height: 80vh; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    .chat-header { background: #7c3aed; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
    .bot-avatar { width: 40px; height: 40px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
    .chat-header-info h2 { font-size: 1rem; color: white; }
    .chat-header-info span { font-size: 0.8rem; color: #d8b4fe; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    .msg { display: flex; gap: 10px; max-width: 85%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
    .msg.bot .msg-avatar { background: #7c3aed; }
    .msg.user .msg-avatar { background: #0f3460; }
    .msg-bubble { padding: 12px 16px; border-radius: 16px; font-size: 0.95rem; line-height: 1.5; }
    .msg.bot .msg-bubble { background: #0f3460; border-bottom-left-radius: 4px; color: #e0e0e0; }
    .msg.user .msg-bubble { background: #7c3aed; border-bottom-right-radius: 4px; color: white; }
    .input-row { padding: 16px; border-top: 1px solid #2a2a4a; display: flex; gap: 10px; }
    .input-row input { flex: 1; background: #0f3460; border: 1px solid #334; color: #e0e0e0; border-radius: 24px; padding: 12px 18px; font-size: 1rem; font-family: inherit; outline: none; transition: border 0.2s; }
    .input-row input:focus { border-color: #7c3aed; }
    .input-row button { background: #7c3aed; border: none; color: white; border-radius: 50%; width: 46px; height: 46px; font-size: 1.2rem; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
    .input-row button:hover { background: #5b21b6; }
    .suggested { padding: 0 16px 12px; display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { background: #0f3460; border: 1px solid #7c3aed; color: #a78bfa; border-radius: 20px; padding: 6px 14px; font-size: 0.82rem; cursor: pointer; transition: all 0.2s; }
    .chip:hover { background: #7c3aed; color: white; }
  </style>
</head>
<body>
  <h1>Tech FAQ Chatbot</h1>
  <p class="subtitle">NLP-powered using TF-IDF cosine similarity (no external libraries required)</p>
  <div class="chat-container">
    <div class="chat-header">
      <div class="bot-avatar">&#129302;</div>
      <div class="chat-header-info">
        <h2>TechBot</h2>
        <span>Online - Ask me about programming, ML, databases, and more</span>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="suggested" id="suggestions">
      <span class="chip" onclick="sendChip(this)">What is Python?</span>
      <span class="chip" onclick="sendChip(this)">What is machine learning?</span>
      <span class="chip" onclick="sendChip(this)">What is Docker?</span>
      <span class="chip" onclick="sendChip(this)">What is an API?</span>
      <span class="chip" onclick="sendChip(this)">What is overfitting?</span>
      <span class="chip" onclick="sendChip(this)">What is blockchain?</span>
    </div>
    <div class="input-row">
      <input type="text" id="userInput" placeholder="Ask a tech question..." autocomplete="off"/>
      <button onclick="handleSend()">&#10148;</button>
    </div>
  </div>

  <script>
    // ---- FAQ Data ----
    const FAQ_DATA = [
      { q: "What is Python?", a: "Python is a high-level, interpreted, general-purpose programming language known for its readability and simplicity. It supports multiple programming paradigms including procedural, object-oriented, and functional programming." },
      { q: "What is machine learning?", a: "Machine learning is a branch of artificial intelligence where systems learn from data to improve their performance on tasks without being explicitly programmed. It includes techniques like supervised learning, unsupervised learning, and reinforcement learning." },
      { q: "What is the difference between supervised and unsupervised learning?", a: "Supervised learning uses labeled training data where the model learns to map inputs to known outputs. Unsupervised learning uses unlabeled data and the model finds hidden patterns or structures on its own." },
      { q: "What is a neural network?", a: "A neural network is a computing system loosely inspired by biological neural networks in the brain. It consists of layers of interconnected nodes (neurons) that process data and learn patterns. Deep neural networks are the foundation of deep learning." },
      { q: "What is deep learning?", a: "Deep learning is a subset of machine learning that uses neural networks with many layers to learn representations of data with multiple levels of abstraction. It has achieved state-of-the-art results in image recognition, NLP, and speech recognition." },
      { q: "What is natural language processing?", a: "Natural Language Processing (NLP) is a field of AI that enables computers to understand, interpret, and generate human language. It includes tasks like text classification, sentiment analysis, machine translation, and question answering." },
      { q: "What is an API?", a: "An API (Application Programming Interface) is a set of rules and protocols that allows different software applications to communicate with each other. It defines methods and data formats for requesting and exchanging information between systems." },
      { q: "What is the difference between GET and POST requests?", a: "GET requests retrieve data from a server with parameters in the URL. POST requests send data to a server in the request body to create or update resources. GET is idempotent and cacheable; POST is not." },
      { q: "What is a RESTful API?", a: "A RESTful API follows the REST architectural style using standard HTTP methods (GET, POST, PUT, DELETE), stateless communication, and resource-based URLs. REST APIs are widely used for web services." },
      { q: "What is Docker?", a: "Docker is a platform for developing, shipping, and running applications in containers. Containers package code and its dependencies together so applications run consistently across different environments." },
      { q: "What is Git?", a: "Git is a distributed version control system that tracks changes in source code. It allows developers to collaborate, maintain history, create branches, and merge changes. GitHub, GitLab, and Bitbucket are popular hosting platforms." },
      { q: "What is a database?", a: "A database is an organized collection of structured data stored electronically. Common types include relational databases (SQL) like MySQL and PostgreSQL, and NoSQL databases like MongoDB and Redis." },
      { q: "What is the difference between SQL and NoSQL?", a: "SQL databases use structured tables with predefined schemas and support complex queries. NoSQL databases are schema-flexible, horizontally scalable, and suited for unstructured or high-velocity data." },
      { q: "What is JavaScript?", a: "JavaScript is a lightweight, interpreted programming language primarily used to make web pages interactive. It runs in the browser and on the server via Node.js. It is the core scripting language of the web alongside HTML and CSS." },
      { q: "What is React?", a: "React is a JavaScript library for building user interfaces, developed by Meta. It uses a component-based architecture and a virtual DOM for efficient rendering. It is widely used for single-page applications." },
      { q: "What is an algorithm?", a: "An algorithm is a finite sequence of well-defined instructions to solve a problem. Algorithms are evaluated by time complexity (speed) and space complexity (memory usage)." },
      { q: "What is object-oriented programming?", a: "Object-oriented programming (OOP) is a paradigm based on objects containing data (attributes) and code (methods). Key principles are encapsulation, inheritance, polymorphism, and abstraction." },
      { q: "What is cloud computing?", a: "Cloud computing is the delivery of computing services over the internet including servers, storage, databases, and software. Major providers are AWS, Azure, and Google Cloud. It offers scalability and pay-as-you-go pricing." },
      { q: "What is a compiler?", a: "A compiler translates high-level source code into machine code before execution. Examples are GCC for C/C++ and javac for Java. This differs from interpreters which execute code line by line at runtime." },
      { q: "What is recursion?", a: "Recursion is a technique where a function calls itself to solve smaller instances of the same problem. Every recursive function needs a base case to stop recursion. Examples include factorial, Fibonacci, and tree traversal." },
      { q: "What is a data structure?", a: "A data structure is a way of organizing and storing data for efficient access and modification. Common structures include arrays, linked lists, stacks, queues, trees, graphs, and hash tables." },
      { q: "What is a hash table?", a: "A hash table stores key-value pairs and uses a hash function to compute an index into an array of buckets. Average time complexity for insert, delete, and search is O(1)." },
      { q: "What is the difference between a list and a tuple in Python?", a: "In Python, a list is mutable (changeable) and uses square brackets. A tuple is immutable and uses parentheses. Tuples are faster and can be dictionary keys; lists are more flexible." },
      { q: "What is an LSTM?", a: "LSTM (Long Short-Term Memory) is a recurrent neural network architecture designed to learn long-term dependencies in sequential data. It uses input, forget, and output gates to control information flow." },
      { q: "What is overfitting?", a: "Overfitting occurs when a model learns training data too well including noise, and performs poorly on new data. It is addressed with regularization, dropout, cross-validation, early stopping, and more training data." },
      { q: "Hello", a: "Hello! I am TechBot, your tech FAQ assistant. Ask me anything about programming, machine learning, databases, algorithms, or web development!" },
      { q: "Hi", a: "Hi there! What tech question can I help you with today?" },
      { q: "What can you do?", a: "I can answer questions about programming, machine learning, databases, web development, algorithms, data structures, and general computer science. Just type your question!" },
      { q: "Thank you", a: "You are welcome! Feel free to ask more questions anytime." },
      { q: "What is blockchain?", a: "Blockchain is a distributed ledger that stores data in a chain of blocks with cryptographic hashes. It is decentralized, transparent, and tamper-resistant. Bitcoin and Ethereum are well-known blockchain platforms." },
      { q: "What is a large language model?", a: "A large language model (LLM) is a deep learning model trained on vast text data using transformer architectures to understand and generate language. Examples include GPT-4, Claude, and LLaMA." }
    ];

    // ---- NLP: TF-IDF Cosine Similarity (no external libraries) ----
    const STOPWORDS = new Set(['a','an','the','is','it','in','on','at','to','for','of','and','or','but','not','with','as','by','from','this','that','are','was','be','been','have','has','had','do','does','did','will','would','could','should','may','might','can','what','which','who','how','when','where','why','i','you','we','they','he','she','me','him','her','us','them','my','your','our','their']);

    function tokenize(text) {
      return text.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/).filter(t => t && !STOPWORDS.has(t));
    }

    function buildIDF(docs) {
      const n = docs.length;
      const df = {};
      docs.forEach(doc => { new Set(doc).forEach(t => { df[t] = (df[t] || 0) + 1; }); });
      const idf = {};
      for (const [t, count] of Object.entries(df)) { idf[t] = Math.log((n + 1) / (count + 1)) + 1; }
      return idf;
    }

    function tfidfVec(tokens, idf) {
      const tf = {};
      tokens.forEach(t => { tf[t] = (tf[t] || 0) + 1; });
      const total = tokens.length || 1;
      const vec = {};
      for (const [t, c] of Object.entries(tf)) { vec[t] = (c / total) * (idf[t] || 1); }
      return vec;
    }

    function cosineSim(v1, v2) {
      const keys = Object.keys(v1).filter(k => v2[k]);
      if (!keys.length) return 0;
      const dot = keys.reduce((s, k) => s + v1[k] * v2[k], 0);
      const m1 = Math.sqrt(Object.values(v1).reduce((s, v) => s + v * v, 0));
      const m2 = Math.sqrt(Object.values(v2).reduce((s, v) => s + v * v, 0));
      return (m1 && m2) ? dot / (m1 * m2) : 0;
    }

    // Preprocess FAQs
    const processedFAQs = FAQ_DATA.map(f => tokenize(f.q + ' ' + f.a));
    const idf = buildIDF(processedFAQs);
    const faqVecs = processedFAQs.map(tokens => tfidfVec(tokens, idf));

    function findBestMatch(input) {
      const tokens = tokenize(input);
      if (!tokens.length) return null;
      const qVec = tfidfVec(tokens, idf);
      let bestIdx = -1, bestScore = 0;
      faqVecs.forEach((v, i) => {
        const s = cosineSim(qVec, v);
        if (s > bestScore) { bestScore = s; bestIdx = i; }
      });
      return (bestIdx >= 0 && bestScore >= 0.05) ? FAQ_DATA[bestIdx].a : null;
    }

    // ---- Chat UI ----
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('userInput');

    function addMessage(text, sender) {
      const div = document.createElement('div');
      div.className = `msg ${sender}`;
      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = sender === 'bot' ? '🤖' : '👤';
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = text;
      div.appendChild(avatar);
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function handleSend() {
      const text = inputEl.value.trim();
      if (!text) return;
      addMessage(text, 'user');
      inputEl.value = '';
      document.getElementById('suggestions').style.display = 'none';
      setTimeout(() => {
        const answer = findBestMatch(text) ||
          "I could not find a relevant answer. Try asking about Python, machine learning, Docker, algorithms, databases, or web development.";
        addMessage(answer, 'bot');
      }, 300);
    }

    function sendChip(el) {
      inputEl.value = el.textContent;
      handleSend();
    }

    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });

    // Initial greeting
    setTimeout(() => addMessage("Hello! I am TechBot. Ask me anything about programming, machine learning, databases, or web development. You can also click a suggested question below!", 'bot'), 400);
  </script>
</body>
</html>
